<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Tarefa</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
      <div class="container">
        <span class="navbar-brand">Nova Tarefa</span>
        <a href="../index.html" class="btn btn-light btn-sm">Voltar</a>
      </div>
    </nav>

    <div class="container" style="max-width: 500px">
      <div class="card shadow-sm">
        <div class="card-body">
          <form id="form-criar">
            <div class="mb-3">
              <label class="form-label">Título</label>
              <input id="titulo" type="text" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Descrição</label>
              <input id="descricao" type="text" class="form-control" />
            </div>
            <button type="submit" class="btn btn-primary w-100">Salvar</button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="criar.js"></script>
  </body>
</html>
