<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Tarefa</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
      <div class="container">
        <span class="navbar-brand">Editar Tarefa</span>
        <a href="../index.html" class="btn btn-light btn-sm">← Voltar</a>
      </div>
    </nav>

    <div class="container" style="max-width: 500px">
      <div class="card shadow-sm">
        <div class="card-body">
          <form id="form-editar">
            <div class="mb-3">
              <label class="form-label">Título</label>
              <input id="titulo" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Descrição</label>
              <input id="descricao" class="form-control" />
            </div>
            <div class="form-check mb-3">
              <input type="checkbox" id="concluida" class="form-check-input" />
              <label class="form-check-label" for="concluida">Concluída</label>
            </div>
            <button type="submit" class="btn btn-warning w-100">
              Atualizar
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="editar.js"></script>
  </body>
</html>
